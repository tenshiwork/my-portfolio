<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom right, #1a1a1a, #2d2d2d);
            color: white;
            font-family: Arial, sans-serif;
        }
        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .content {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }
        .behance-button {
            display: inline-block;
            background-color: #3498db;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        .behance-button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div class="content">
        <h1>Le Nouveau contenu sera bientôt disponible</h1>
        <p>Actuellement, je mets à jour le contenu du site. Ce sera très, très bientôt!
Bonne journée!</p>
        <a href="https://www.behance.net/tenshiwhisper" class="behance-button" target="_blank">
            Aller sur Behance
        </a>
    </div>
</body>
</html>
